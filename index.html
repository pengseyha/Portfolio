<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Peng Seyha" />
    <meta
      name="description"
      content="Peng Seyha SOC portfolio showcasing a monitoring platform, SIEM workflows, detection engineering, incident response practice, and a hands-on cybersecurity lab."
    />
    <meta property="og:title" content="Peng Seyha - SOC Monitoring & Cybersecurity Portfolio" />
    <meta
      property="og:description"
      content="A product-style cybersecurity portfolio built around SOC monitoring, Splunk, pfSense, Snort, incident workflow, and practical security evidence."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <script>
      (() => {
        try {
          const storedTheme = localStorage.getItem("portfolio-theme");
          const preferredTheme =
            storedTheme === "light" || storedTheme === "dark" ? storedTheme : "dark";

          document.documentElement.dataset.theme = preferredTheme;
          document.documentElement.style.colorScheme = preferredTheme;
        } catch {
          document.documentElement.dataset.theme = "dark";
          document.documentElement.style.colorScheme = "dark";
        }
      })();
    </script>
    <title>Peng Seyha - SOC Monitoring & Cybersecurity Portfolio</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
